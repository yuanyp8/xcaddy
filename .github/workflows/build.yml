name: Build Caddy with AliDNS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      caddy_version:
        description: 'Caddy version'
        required: true
        default: 'v2.11.2'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          CADDY_VERSION: ${{ github.event.inputs.caddy_version || 'v2.11.2' }}
        run: |
          xcaddy build "${CADDY_VERSION}" --with github.com/caddy-dns/alidns
          mv caddy "caddy-linux-${{ matrix.arch }}"

      - name: Verify module list
        if: matrix.arch == 'amd64'
        run: |
          ./caddy-linux-amd64 version
          ./caddy-linux-amd64 list-modules | grep -x 'dns.providers.alidns'

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-linux-${{ matrix.arch }}
          path: caddy-linux-${{ matrix.arch }}
          retention-days: 30

  package-run:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download compiled binary
        uses: actions/download-artifact@v4
        with:
          name: caddy-linux-${{ matrix.arch }}
          path: .

      - name: Prepare workspace
        run: mv "caddy-linux-${{ matrix.arch }}" caddy

      - name: Build offline installer
        run: bash build.sh --arch "${{ matrix.arch }}"

      - name: Upload .run artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-offline-run-${{ matrix.arch }}
          path: |
            caddy-alidns-linux-${{ matrix.arch }}.run
            caddy-alidns-linux-${{ matrix.arch }}.run.sha256
          retention-days: 30

  release:
    needs: package-run
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all .run artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: caddy-offline-run-*
          merge-multiple: true

      - name: List release files
        run: ls -lh assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Caddy + AliDNS ${{ github.ref_name }}"
          body: |
            Offline Caddy installers with AliDNS support.

            Files:
            - `caddy-alidns-linux-amd64.run`
            - `caddy-alidns-linux-arm64.run`

            Example:
            ```bash
            chmod +x caddy-alidns-linux-amd64.run
            sudo ./caddy-alidns-linux-amd64.run install \
              --ak YOUR_AK \
              --sk YOUR_SK \
              --listen image.example.com \
              --backend 127.0.0.1:8080
            ```
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
